<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Citas</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" type="text/css" href="/style.css" />
    <style>
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .btn-edit, .btn-delete {
            padding: 5px 10px;
            font-size: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-edit {
            background-color: #007bff;
            color: white;
        }
        .btn-edit:hover {
            background-color: #0056b3;
        }
        .btn-delete {
            background-color: #dc3545;
            color: white;
        }
        .btn-delete:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
<div class="page-container">
    <h1>Citas agendadas</h1>
    <div class="actions">
        <a class="btn btn-primary" th:href="@{/appointments/new}">Agendar cita</a>
        <a class="btn btn-secondary" th:href="@{/home}">Volver a inicio</a>
    </div>
    <div class="table-wrapper">
        <table class="patients-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Paciente</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Motivo</th>
                <th>Veterinario</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody id="appointmentsTableBody">
            <tr><td colspan="7">Cargando datos...</td></tr>
            </tbody>
        </table>
    </div>
</div>
<script>
    async function loadAppointments() {
        const token = localStorage.getItem('jwtToken');
        if (!token) {
            window.location.href = '/login';
            return;
        }

        console.log('-> Frontend: loadAppointments called with token=', token);

        try {
            console.log('-> Frontend: GET /api/appointments');
            const response = await fetch('/api/appointments', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            console.log('<- Frontend: GET /api/appointments status=' + response.status);

            if (response.status === 401 || response.status === 403) {
                localStorage.removeItem('jwtToken');
                window.location.href = '/login';
                return;
            }

            const appointments = await response.json();
            console.log('<- Frontend: GET /api/appointments body=', appointments);
            const tbody = document.getElementById('appointmentsTableBody');
            tbody.innerHTML = '';

            if (!appointments.length) {
                tbody.innerHTML = '<tr><td colspan="7">No hay citas agendadas.</td></tr>';
                return;
            }

            appointments.forEach(appointment => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>${appointment.id}</td><td>${appointment.patientId}</td><td>${appointment.date}</td><td>${appointment.time}</td><td>${appointment.reason}</td><td>${appointment.veterinarian}</td><td>
                    <div class="action-buttons">
                        <button class="btn-edit" onclick="editAppointment(${appointment.id})">Editar</button>
                        <button class="btn-delete" onclick="deleteAppointment(${appointment.id})">Eliminar</button>
                    </div>
                </td>`;
                tbody.appendChild(row);
            });
        } catch (error) {
            console.error('Frontend: GET /api/appointments error=', error.message, error.stack);
            document.getElementById('appointmentsTableBody').innerHTML = '<tr><td colspan="7">Error cargando citas.</td></tr>';
        }
    }

    function editAppointment(id) {
        console.log('-> Frontend: editAppointment id=' + id);
        window.location.href = '/appointments/' + id + '/edit';
    }

    async function deleteAppointment(id) {
        console.log('-> Frontend: deleteAppointment id=' + id);
        if (!confirm('¿Está seguro de que desea eliminar esta cita?')) {
            return;
        }

        const token = localStorage.getItem('jwtToken');
        if (!token) {
            alert('No hay sesión activa');
            window.location.href = '/login';
            return;
        }

        try {
            console.log('-> Frontend: DELETE /api/appointments/' + id);
            const response = await fetch('/api/appointments/' + id, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token }
            });
            console.log('<- Frontend: DELETE /api/appointments/' + id + ' status=' + response.status);

            if (response.status === 401 || response.status === 403) {
                localStorage.removeItem('jwtToken');
                window.location.href = '/login';
                return;
            }

            if (response.ok) {
                alert('Cita eliminada correctamente');
                loadAppointments();
            } else {
                alert('Error al eliminar cita');
            }
        } catch (error) {
            console.error('Frontend: DELETE /api/appointments/' + id + ' error=', error.message);
            alert('Error al eliminar cita: ' + error.message);
        }
    }

    loadAppointments();
</script>
</body>
</html>
